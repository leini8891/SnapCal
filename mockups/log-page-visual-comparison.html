<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapCal Log Page Visual Comparison</title>
    <style>
      :root {
        color-scheme: light;
        --page: #fffdfb;
        --ink: #1f1712;
        --muted: #75685d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--ink);
        font-family:
          Inter, Manrope, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1440px, 100%);
        margin: 0 auto;
        padding: 28px 20px 36px;
      }

      .frame {
        overflow: hidden;
        border: 1px solid #eadfd4;
        border-radius: 26px;
        background: #ffffff;
        box-shadow: 0 18px 60px rgba(31, 23, 18, 0.08);
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .caption {
        margin: 16px 2px 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="frame" aria-label="SnapCal visual comparison mockup">
        <svg viewBox="0 0 1440 960" role="img">
          <defs>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#52361c" flood-opacity="0.16" />
            </filter>
            <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1f1712" flood-opacity="0.10" />
            </filter>
            <filter id="ctaShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#f2502b" flood-opacity="0.28" />
            </filter>
            <linearGradient id="oldBg" x1="0" x2="1" y1="0" y2="1">
              <stop stop-color="#fff7ef" />
              <stop offset="0.48" stop-color="#f5dfb5" />
              <stop offset="1" stop-color="#f7fbef" />
            </linearGradient>
            <linearGradient id="oldHero" x1="0" x2="1" y1="0" y2="1">
              <stop stop-color="#fffaf4" stop-opacity="0.78" />
              <stop offset="1" stop-color="#fff3e3" stop-opacity="0.62" />
            </linearGradient>
            <linearGradient id="newBg" x1="0" x2="1" y1="0" y2="1">
              <stop stop-color="#fffdfb" />
              <stop offset="1" stop-color="#fff8f4" />
            </linearGradient>
            <linearGradient id="foodPhoto" x1="0" x2="1" y1="0" y2="1">
              <stop stop-color="#f9c55d" />
              <stop offset="0.44" stop-color="#f2702e" />
              <stop offset="1" stop-color="#2fa66a" />
            </linearGradient>
            <linearGradient id="newCta" x1="0" x2="1">
              <stop stop-color="#f2502b" />
              <stop offset="1" stop-color="#ff7a45" />
            </linearGradient>
            <clipPath id="phoneClip">
              <rect x="118" y="54" width="330" height="650" rx="42" />
            </clipPath>
          </defs>

          <rect width="1440" height="960" fill="#fffdfb" />

          <text x="64" y="70" fill="#1f1712" font-size="28" font-weight="800">SnapCal 记餐页视觉方向对比</text>
          <text x="64" y="104" fill="#7a6e63" font-size="16">静态 mockup: 左边是当前观感问题, 右边是建议的新方向。这个文件不接入真实代码。</text>

          <line x1="720" y1="136" x2="720" y2="880" stroke="#eadfd4" stroke-width="1" stroke-dasharray="10 10" />

          <!-- Old direction panel -->
          <g transform="translate(58 148)">
            <text x="0" y="0" fill="#1f1712" font-size="24" font-weight="800">当前方向</text>
            <text x="0" y="28" fill="#7a6e63" font-size="15">偏桌面壳、毛玻璃、半透明灰、CTA 不突出</text>

            <rect x="0" y="54" width="600" height="690" rx="34" fill="url(#oldBg)" />
            <circle cx="90" cy="110" r="110" fill="#ffc471" opacity="0.34" />
            <circle cx="520" cy="130" r="105" fill="#8ebf7c" opacity="0.20" />

            <rect x="28" y="82" width="544" height="80" rx="28" fill="#fffaf3" opacity="0.72" stroke="rgba(55,36,24,0.12)" filter="url(#softShadow)" />
            <text x="54" y="122" fill="#24160f" font-size="24" font-weight="700">SnapCal</text>
            <text x="54" y="146" fill="#6b6259" font-size="13">面向新加坡餐食的快速热量记录。</text>
            <g transform="translate(320 104)">
              <rect width="58" height="36" rx="18" fill="#e3d9cf" />
              <text x="18" y="23" fill="#24160f" font-size="13" font-weight="800">记餐</text>
              <rect x="66" width="58" height="36" rx="18" fill="#fff" opacity="0.82" stroke="#eadfd4" />
              <text x="84" y="23" fill="#24160f" font-size="13" font-weight="800">历史</text>
              <rect x="132" width="58" height="36" rx="18" fill="#fff" opacity="0.82" stroke="#eadfd4" />
              <text x="150" y="23" fill="#24160f" font-size="13" font-weight="800">设置</text>
            </g>

            <rect x="28" y="198" width="544" height="228" rx="32" fill="url(#oldHero)" stroke="rgba(55,36,24,0.10)" filter="url(#softShadow)" />
            <rect x="56" y="230" width="122" height="28" rx="14" fill="#dfe8df" />
            <text x="74" y="249" fill="#0e6e73" font-size="13" font-weight="800" letter-spacing="3">新加坡餐食记录</text>
            <text x="56" y="304" fill="#24160f" font-size="42" font-weight="800">拍一餐, 估热量,</text>
            <text x="56" y="358" fill="#24160f" font-size="42" font-weight="800">快速记录。</text>
            <text x="56" y="392" fill="#6b6259" font-size="15">上传照片后给出估算, 需要时快速微调。</text>
            <rect x="362" y="278" width="170" height="76" rx="24" fill="#fff" opacity="0.78" stroke="#eadfd4" />
            <text x="384" y="306" fill="#6b6259" font-size="13" letter-spacing="3">今日剩余</text>
            <text x="384" y="340" fill="#24160f" font-size="28">1550 kcal</text>

            <rect x="28" y="456" width="250" height="240" rx="32" fill="#fffaf3" opacity="0.78" stroke="rgba(55,36,24,0.10)" filter="url(#softShadow)" />
            <text x="54" y="496" fill="#6b6259" font-size="14" font-weight="800" letter-spacing="3">记录餐食</text>
            <rect x="54" y="524" width="198" height="116" rx="22" fill="#fff" opacity="0.72" stroke="#eadfd4" />
            <circle cx="153" cy="582" r="28" fill="#ef6a43" opacity="0.16" />
            <path d="M134 586 h38 m-19 -19 v38" stroke="#6b6259" stroke-width="4" stroke-linecap="round" />
            <rect x="54" y="656" width="90" height="32" rx="16" fill="#24160f" />
            <text x="82" y="677" fill="#fff" font-size="13" font-weight="800">拍照</text>
            <rect x="152" y="656" width="100" height="32" rx="16" fill="#fff" opacity="0.84" stroke="#eadfd4" />
            <text x="178" y="677" fill="#24160f" font-size="13" font-weight="800">文字搜索</text>

            <rect x="306" y="456" width="266" height="240" rx="32" fill="#fffaf3" opacity="0.78" stroke="rgba(55,36,24,0.10)" filter="url(#softShadow)" />
            <text x="332" y="496" fill="#6b6259" font-size="14" font-weight="800" letter-spacing="3">估算结果</text>
            <text x="332" y="556" fill="#24160f" font-size="36" font-weight="800">等待中</text>
            <rect x="332" y="588" width="200" height="34" rx="17" fill="#eaf2f2" />
            <text x="352" y="611" fill="#0e6e73" font-size="13" font-weight="800">Best-effort estimate</text>
            <rect x="332" y="644" width="200" height="34" rx="17" fill="#24160f" />
            <text x="382" y="666" fill="#fff" font-size="14" font-weight="800">确认记录</text>

            <g transform="translate(28 720)">
              <rect width="544" height="72" rx="22" fill="#fffaf3" opacity="0.68" stroke="#eadfd4" />
              <text x="26" y="29" fill="#c13a1b" font-size="15" font-weight="800">主要问题</text>
              <text x="26" y="54" fill="#7a6e63" font-size="14">层层半透明卡片 + 暗棕主按钮 + 导航不像手机 App</text>
            </g>
          </g>

          <!-- New direction panel -->
          <g transform="translate(782 148)">
            <text x="0" y="0" fill="#1f1712" font-size="24" font-weight="800">新方向</text>
            <text x="0" y="28" fill="#7a6e63" font-size="15">手机优先、实色卡片、食物感、coral 主操作</text>

            <rect x="0" y="54" width="600" height="690" rx="34" fill="url(#newBg)" />
            <rect x="28" y="82" width="544" height="620" rx="30" fill="#fbf6f0" stroke="#ece3d8" />

            <g clip-path="url(#phoneClip)">
              <rect x="118" y="54" width="330" height="650" rx="42" fill="#fffdfb" />
              <rect x="118" y="54" width="330" height="104" fill="#fffdfb" />
              <text x="146" y="108" fill="#1f1712" font-size="27" font-weight="900">SnapCal</text>
              <text x="146" y="132" fill="#75685d" font-size="13">今天还剩 1550 kcal</text>
              <rect x="348" y="86" width="72" height="34" rx="17" fill="#1f1712" />
              <text x="368" y="108" fill="#fff" font-size="13" font-weight="800">CN</text>

              <rect x="146" y="180" width="274" height="186" rx="24" fill="#ffffff" stroke="#ece3d8" filter="url(#cardShadow)" />
              <text x="170" y="218" fill="#1f1712" font-size="26" font-weight="900">拍一餐, 快速记录</text>
              <text x="170" y="245" fill="#75685d" font-size="14">拍照或输入餐名, 估算后再确认。</text>
              <rect x="170" y="272" width="226" height="70" rx="18" fill="url(#foodPhoto)" />
              <circle cx="209" cy="307" r="20" fill="#fff7d8" opacity="0.92" />
              <circle cx="257" cy="307" r="20" fill="#d93f1e" opacity="0.92" />
              <circle cx="306" cy="307" r="20" fill="#2c8c57" opacity="0.92" />
              <path d="M172 332 C224 300 258 360 328 318 C356 302 378 302 396 310 L396 342 L170 342 Z" fill="#ffffff" opacity="0.24" />

              <g transform="translate(146 388)">
                <rect width="274" height="86" rx="22" fill="#ffffff" stroke="#ece3d8" filter="url(#cardShadow)" />
                <text x="22" y="29" fill="#75685d" font-size="13">当前估算</text>
                <text x="22" y="65" fill="#f2502b" font-size="34" font-weight="900">520-680 kcal</text>
                <rect x="184" y="23" width="68" height="28" rx="14" fill="#ffede6" />
                <text x="202" y="42" fill="#c13a1b" font-size="12" font-weight="800">中置信</text>
              </g>

              <g transform="translate(146 492)">
                <rect width="82" height="54" rx="16" fill="#fbf6f0" />
                <text x="16" y="22" fill="#75685d" font-size="12">蛋白质</text>
                <text x="16" y="42" fill="#1f1712" font-size="15" font-weight="800">28-36g</text>
                <rect x="96" width="82" height="54" rx="16" fill="#fbf6f0" />
                <text x="112" y="22" fill="#75685d" font-size="12">碳水</text>
                <text x="112" y="42" fill="#1f1712" font-size="15" font-weight="800">52-68g</text>
                <rect x="192" width="82" height="54" rx="16" fill="#fbf6f0" />
                <text x="208" y="22" fill="#75685d" font-size="12">脂肪</text>
                <text x="208" y="42" fill="#1f1712" font-size="15" font-weight="800">12-20g</text>
              </g>

              <rect x="146" y="568" width="274" height="56" rx="20" fill="url(#newCta)" filter="url(#ctaShadow)" />
              <text x="228" y="603" fill="#fff" font-size="17" font-weight="900">记录这餐</text>

              <rect x="118" y="636" width="330" height="68" fill="#ffffff" stroke="#ece3d8" />
              <g transform="translate(148 651)">
                <circle cx="18" cy="13" r="11" fill="#f2502b" />
                <rect x="11" y="8" width="14" height="10" rx="3" fill="#fff" />
                <text x="0" y="42" fill="#f2502b" font-size="12" font-weight="800">记餐</text>
              </g>
              <g transform="translate(223 651)">
                <path d="M8 22 L17 10 L26 18 L36 6" fill="none" stroke="#75685d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                <text x="0" y="42" fill="#75685d" font-size="12" font-weight="700">历史</text>
              </g>
              <g transform="translate(300 651)">
                <rect x="8" y="4" width="24" height="24" rx="7" fill="none" stroke="#75685d" stroke-width="3" />
                <text x="0" y="42" fill="#75685d" font-size="12" font-weight="700">目标</text>
              </g>
              <g transform="translate(378 651)">
                <circle cx="18" cy="16" r="11" fill="none" stroke="#75685d" stroke-width="3" />
                <path d="M18 8 v16 M10 16 h16" stroke="#75685d" stroke-width="3" stroke-linecap="round" />
                <text x="-2" y="42" fill="#75685d" font-size="12" font-weight="700">设置</text>
              </g>
            </g>

            <rect x="118" y="54" width="330" height="650" rx="42" fill="none" stroke="#1f1712" stroke-width="5" opacity="0.95" />
            <rect x="220" y="68" width="126" height="7" rx="4" fill="#1f1712" opacity="0.22" />

            <g transform="translate(28 720)">
              <rect width="544" height="72" rx="22" fill="#ffffff" stroke="#ece3d8" />
              <text x="26" y="29" fill="#0e8a86" font-size="15" font-weight="900">目标观感</text>
              <text x="26" y="54" fill="#75685d" font-size="14">像真正手机食物 App: 主任务明确, 颜色更有食欲, 底部 tab 更自然</text>
            </g>
          </g>

          <g transform="translate(64 880)">
            <rect width="1312" height="42" rx="21" fill="#fbf6f0" stroke="#ece3d8" />
            <text x="26" y="27" fill="#1f1712" font-size="14" font-weight="800">建议确认点:</text>
            <text x="120" y="27" fill="#75685d" font-size="14">是否接受 coral 作为主操作色、手机底部 tab、去毛玻璃白底卡片、缩小 hero 并突出“记录这餐”。</text>
          </g>
        </svg>
      </div>
      <p class="caption">
        文件位置:
        <code>/Users/bonnie/Documents/Code/SnapCal/mockups/log-page-visual-comparison.html</code>
      </p>
    </main>
  </body>
</html>
